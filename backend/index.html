<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Translator</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Custom configuration */
        body {
            font-family: 'Inter', sans-serif;
            /* Subtle dark-to-light gradient background for depth */
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Custom scrollbar for the dropdown menu */
        .dropdown-menu-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .dropdown-menu-scroll::-webkit-scrollbar-thumb {
            background-color: #93c5fd; /* blue-300 */
            border-radius: 3px;
        }
        /* Fade-in animation for dropdown */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-menu.active {
            display: flex !important;
            animation: fadeIn 0.2s ease-out;
        }
        /* Input Wrapper Shadow Enhancement */
        .input-wrapper:focus-within {
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); /* Custom blue glow */
        }
        /* Ensure the main content uses full available height on mobile */
        @media (max-width: 640px) {
            body {
                justify-content: flex-start;
                padding-top: 0;
            }
            .translation-card {
                min-height: 100vh;
                border-radius: 0;
                box-shadow: none; /* Remove shadow on full mobile view */
            }
        }
    </style>
</head>
<body>

    <!-- Main Translation Card Container -->
    <div class="translation-card w-full max-w-2xl mx-auto bg-white shadow-2xl rounded-2xl flex flex-col transition-all duration-300 p-6 md:p-8 border border-gray-100">

        <h1 class="text-3xl font-extrabold text-gray-800 text-center mb-6 border-b pb-4">
            AI Translator
        </h1>

        <!-- Header: Language Selectors and Swap Button -->
        <header class="flex justify-between items-center relative mb-6 p-2 bg-gray-50 rounded-xl border border-gray-200">
            
            <!-- Source Language Selector -->
            <div class="lang-selector flex-1 cursor-pointer p-3 rounded-xl transition-all duration-200 hover:bg-white active:scale-[0.98]" onclick="toggleMenu('source')">
                <div class="flex items-center justify-center space-x-2">
                    <span id="sourceLangLabel" class="text-xl font-bold text-indigo-600">English</span>
                    <!-- Icon for dropdown -->
                    <svg class="w-5 h-5 text-indigo-500 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            
            <!-- Dropdown for Source -->
            <div class="dropdown-menu absolute z-50 top-full left-2 mt-3 bg-white shadow-3xl rounded-xl w-52 flex-col border border-indigo-200 dropdown-menu-scroll hidden max-h-64 overflow-y-auto" id="sourceMenu">
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer transition-colors duration-150 rounded-xl selected bg-indigo-100 font-semibold text-indigo-700" onclick="setLang('source', 'English', 'en')">English</div>

                <!-- New: Assamese -->
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer transition-colors duration-150 rounded-xl" onclick="setLang('source', 'Assamese', 'as')">Assamese</div>
                
            </div>

            <!-- Swap Button -->
            <button class="swap-btn w-12 h-12 mx-4 flex items-center justify-center bg-indigo-500 rounded-full text-white hover:bg-indigo-600 transition-all duration-300 shadow-md hover:shadow-lg active:scale-90" onclick="swapLanguages()">
                <svg class="w-6 h-6 transition-transform duration-300" id="swapIcon" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/>
                </svg>
            </button>

            <!-- Target Language Selector -->
            <div class="lang-selector flex-1 cursor-pointer p-3 rounded-xl transition-all duration-200 hover:bg-white active:scale-[0.98]" onclick="toggleMenu('target')">
                <div class="flex items-center justify-center space-x-2">
                    <span id="targetLangLabel" class="text-xl font-bold text-indigo-600">Assamese</span>
                    <!-- Icon for dropdown -->
                    <svg class="w-5 h-5 text-indigo-500 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            
            <!-- Dropdown for Target -->
            <div class="dropdown-menu absolute z-50 top-full right-2 mt-3 bg-white shadow-3xl rounded-xl w-52 flex-col border border-indigo-200 dropdown-menu-scroll hidden max-h-64 overflow-y-auto" id="targetMenu">
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer transition-colors duration-150 rounded-xl" onclick="setLang('target', 'English', 'en')">English</div>
                                <!-- New: Assamese -->
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer transition-colors duration-150 rounded-xl" onclick="setLang('target', 'Assamese', 'as')">Assamese</div>
            </div>

        </header>

        <!-- Main Translation Display Area -->
        <main class="flex-1 p-6 bg-indigo-50 rounded-2xl transition-all duration-300 overflow-y-auto min-h-60 border-2 border-dashed border-indigo-200">
            <p id="originalDisplay" class="text-sm text-indigo-500 mb-3 min-h-[1.25rem] font-medium border-b border-indigo-200 pb-2"></p>
            
            <div class="flex items-start">
                <!-- Translation Result / Loader -->
                <div id="translationResult" class="text-3xl md:text-4xl font-extrabold text-gray-900 leading-tight">
                    Start translating...
                </div>
                <div id="loader" class="loader ml-4 mt-1 border-4 border-white border-t-indigo-600 w-8 h-8 rounded-full animate-spin hidden shadow-lg"></div>
            </div>
            <p id="errorBox" class="text-red-600 bg-red-100 p-2 rounded-lg mt-4 hidden text-sm font-semibold"></p>
        </main>

        <!-- Input Area -->
        <div class="mt-6 p-2">
            <div class="input-wrapper flex items-center bg-white border-2 border-gray-300 rounded-[30px] shadow-lg transition-all duration-300">
                <input type="text" id="inputField" placeholder="Enter text to translate..." autocomplete="off"
                    class="flex-1 border-none bg-transparent text-gray-800 text-lg px-6 py-4 focus:outline-none placeholder-gray-400">
                
                <button class="send-btn w-14 h-14 flex items-center justify-center bg-indigo-600 rounded-full text-white hover:bg-indigo-700 transition-colors duration-200 mr-2 shadow-xl hover:shadow-2xl active:scale-95" onclick="initiateTranslation()">
                    <!-- Send Icon (Arrow) -->
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        // Store current languages
        let sourceCode = 'en';
        let sourceName = 'English';
let targetCode = 'as';
let targetName = 'Assamese';


        // UPDATED languageMap
        const languageMap = {
            'en': 'English',
            'as': 'Assamese', // Added Assamese
        };

        const DOM = {
            sourceMenu: document.getElementById('sourceMenu'),
            targetMenu: document.getElementById('targetMenu'),
            sourceLangLabel: document.getElementById('sourceLangLabel'),
            targetLangLabel: document.getElementById('targetLangLabel'),
            swapIcon: document.getElementById('swapIcon'),
            inputField: document.getElementById('inputField'),
            originalDisplay: document.getElementById('originalDisplay'),
            translationResult: document.getElementById('translationResult'),
            loader: document.getElementById('loader'),
            errorBox: document.getElementById('errorBox')
        };

        // Function to toggle specific menu (source or target)
        function toggleMenu(type) {
            // Close the other menu first
            const otherType = type === 'source' ? 'target' : 'source';
            DOM[otherType + 'Menu'].classList.remove('active');

            // Toggle the requested menu
            DOM[type + 'Menu'].classList.toggle('active');
        }

        // Function to update the selected status in the dropdowns
        function updateSelectedState(menuId, code) {
            const menu = document.getElementById(menuId);
            if (!menu) return;

            menu.querySelectorAll('.dropdown-item').forEach(item => {
                // Check if the item's onclick attribute contains the target language code
                if (item.getAttribute('onclick').includes(`'${code}'`)) {
                    item.classList.add('selected', 'bg-indigo-100', 'font-semibold', 'text-indigo-700');
                    item.classList.remove('text-gray-700', 'hover:bg-indigo-50');
                } else {
                    item.classList.remove('selected', 'bg-indigo-100', 'font-semibold', 'text-indigo-700');
                    item.classList.add('text-gray-700', 'hover:bg-indigo-50');
                }
            });
        }

        // Set Language logic
        function setLang(type, name, code) {
            // Close menus immediately
            DOM.sourceMenu.classList.remove('active');
            DOM.targetMenu.classList.remove('active');

            // Prevent setting source and target to the same language
            if (type === 'source' && code === targetCode) {
                swapLanguages();
                return;
            } else if (type === 'target' && code === sourceCode) {
                swapLanguages();
                return;
            }

            if (type === 'source') {
                sourceCode = code;
                sourceName = name;
                DOM.sourceLangLabel.innerText = name;
                updateSelectedState('sourceMenu', code);
            } else {
                targetCode = code;
                targetName = name;
                DOM.targetLangLabel.innerText = name;
                updateSelectedState('targetMenu', code);
            }
            
            // Trigger translation if text exists
            const text = DOM.inputField.value;
            if(text.trim() !== "") initiateTranslation();
        }

        // Initial setup for selected states
        document.addEventListener('DOMContentLoaded', () => {
            updateSelectedState('sourceMenu', sourceCode);
            updateSelectedState('targetMenu', targetCode);
        });


        // Swap Languages Logic
        function swapLanguages() {
            // Animate icon rotation
            DOM.swapIcon.style.transform = "rotate(180deg)";
            setTimeout(() => DOM.swapIcon.style.transform = "rotate(0deg)", 300);

            // Swap Variables
            let tempCode = sourceCode;
            sourceCode = targetCode;
            targetCode = tempCode;

            let tempName = sourceName;
            sourceName = targetName;
            targetName = tempName;

            // Update Visuals
            DOM.sourceLangLabel.innerText = sourceName;
            DOM.targetLangLabel.innerText = targetName;

            // Update dropdown selected classes
            updateSelectedState('sourceMenu', sourceCode);
            updateSelectedState('targetMenu', targetCode);

            // Trigger Translation
            const text = DOM.inputField.value;
            if(text.trim() !== "") initiateTranslation();
        }

        // Close menus when clicking outside
        document.addEventListener('click', function(event) {
            const header = document.querySelector('header');
            if (!header.contains(event.target)) {
                DOM.sourceMenu.classList.remove('active');
                DOM.targetMenu.classList.remove('active');
            }
        });

        // Submit on Enter key press
        DOM.inputField.addEventListener("keypress", (e) => {
            if (e.key === "Enter") initiateTranslation();
        });

        // --- Translation Logic using local /translate endpoint ---

        async function initiateTranslation() {
            const text = DOM.inputField.value.trim();

            if (!text) {
                DOM.originalDisplay.innerText = "";
                DOM.translationResult.innerText = "Start translating...";
                return;
            }

            // Update UI for loading state
            DOM.originalDisplay.innerText = text;
            DOM.translationResult.innerText = "";
            DOM.errorBox.classList.add('hidden');
            DOM.loader.classList.remove('hidden');

            try {
                // Using the local /translate endpoint as requested
                const response = await fetch("/translate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        text: text, 
                        source_language: sourceCode, 
                        target_language: targetCode 
                    })
                });

                if (!response.ok) throw new Error("Server Error");
                const data = await response.json();
                
                DOM.loader.classList.add('hidden');

                const translatedText = data.translated_text;

                if (translatedText) {
                    DOM.translationResult.innerText = translatedText;
                } else {
                    throw new Error("Translation failed to return text.");
                }

            } catch (error) {
                console.error("Translation Error:", error);
                DOM.loader.classList.add('hidden');
                DOM.translationResult.innerText = "Error translating.";
                DOM.errorBox.innerText = `Could not complete request to /translate endpoint. Details: ${error.message}.`;
                DOM.errorBox.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
