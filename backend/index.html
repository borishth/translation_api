<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .dropdown-menu-scroll::-webkit-scrollbar { width: 6px; }
        .dropdown-menu-scroll::-webkit-scrollbar-thumb { background-color: #93c5fd; border-radius: 3px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-menu.active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        .input-wrapper:focus-within { box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        @media (max-width: 640px) {
            body { justify-content: flex-start; padding-top: 0; }
            .translation-card { min-height: 100vh; border-radius: 0; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="translation-card w-full max-w-2xl mx-auto bg-white shadow-2xl rounded-2xl flex flex-col transition-all duration-300 p-6 md:p-8 border border-gray-100">

        <h1 class="text-3xl font-extrabold text-gray-800 text-center mb-6 border-b pb-4">AI Translator</h1>

        <header class="flex justify-between items-center relative mb-6 p-2 bg-gray-50 rounded-xl border border-gray-200">
            <!-- Source Selector -->
            <div class="lang-selector flex-1 cursor-pointer p-3 rounded-xl transition-all duration-200 hover:bg-white" onclick="toggleMenu('source')">
                <div class="flex items-center justify-center space-x-2">
                    <span id="sourceLangLabel" class="text-xl font-bold text-indigo-600">English</span>
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            
            <div class="dropdown-menu absolute z-50 top-full left-2 mt-3 bg-white shadow-3xl rounded-xl w-52 flex-col border border-indigo-200 hidden max-h-64 overflow-y-auto" id="sourceMenu">
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer" onclick="setLang('source', 'English', 'en')">English</div>
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer" onclick="setLang('source', 'Assamese', 'as')">Assamese</div>
            </div>

            <button class="swap-btn w-12 h-12 mx-4 flex items-center justify-center bg-indigo-500 rounded-full text-white hover:bg-indigo-600 transition-all shadow-md active:scale-90" onclick="swapLanguages()">
                <svg class="w-6 h-6" id="swapIcon" fill="currentColor" viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg>
            </button>

            <!-- Target Selector -->
            <div class="lang-selector flex-1 cursor-pointer p-3 rounded-xl transition-all duration-200 hover:bg-white" onclick="toggleMenu('target')">
                <div class="flex items-center justify-center space-x-2">
                    <span id="targetLangLabel" class="text-xl font-bold text-indigo-600">Assamese</span>
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            
            <div class="dropdown-menu absolute z-50 top-full right-2 mt-3 bg-white shadow-3xl rounded-xl w-52 flex-col border border-indigo-200 hidden max-h-64 overflow-y-auto" id="targetMenu">
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer" onclick="setLang('target', 'English', 'en')">English</div>
                <div class="dropdown-item p-3 text-gray-700 hover:bg-indigo-50 cursor-pointer" onclick="setLang('target', 'Assamese', 'as')">Assamese</div>
            </div>
        </header>

        <main class="flex-1 p-6 bg-indigo-50 rounded-2xl min-h-60 border-2 border-dashed border-indigo-200">
            <p id="originalDisplay" class="text-sm text-indigo-500 mb-3 min-h-[1.25rem] font-medium border-b border-indigo-200 pb-2"></p>
            <div class="flex items-start">
                <div id="translationResult" class="text-3xl md:text-4xl font-extrabold text-gray-900 leading-tight">Start translating...</div>
                <div id="loader" class="ml-4 mt-1 border-4 border-white border-t-indigo-600 w-8 h-8 rounded-full animate-spin hidden"></div>
            </div>
            <p id="errorBox" class="text-red-600 bg-red-100 p-2 rounded-lg mt-4 hidden text-sm font-semibold"></p>
        </main>

        <div class="mt-6 p-2">
            <div class="input-wrapper flex items-center bg-white border-2 border-gray-300 rounded-[30px] shadow-lg">
                <input type="text" id="inputField" placeholder="Enter text to translate..." autocomplete="off"
                    class="flex-1 border-none bg-transparent text-gray-800 text-lg px-6 py-4 focus:outline-none">
                <button class="w-14 h-14 flex items-center justify-center bg-indigo-600 rounded-full text-white hover:bg-indigo-700 mr-2 shadow-xl active:scale-95" onclick="initiateTranslation()">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let sourceCode = 'en', targetCode = 'as';
        let sourceName = 'English', targetName = 'Assamese';

        const DOM = {
            sourceMenu: document.getElementById('sourceMenu'),
            targetMenu: document.getElementById('targetMenu'),
            sourceLangLabel: document.getElementById('sourceLangLabel'),
            targetLangLabel: document.getElementById('targetLangLabel'),
            swapIcon: document.getElementById('swapIcon'),
            inputField: document.getElementById('inputField'),
            originalDisplay: document.getElementById('originalDisplay'),
            translationResult: document.getElementById('translationResult'),
            loader: document.getElementById('loader'),
            errorBox: document.getElementById('errorBox')
        };

        function toggleMenu(type) {
            const other = type === 'source' ? 'target' : 'source';
            DOM[other + 'Menu'].classList.remove('active');
            DOM[type + 'Menu'].classList.toggle('active');
        }

        function setLang(type, name, code) {
            if (type === 'source') {
                if (code === targetCode) return swapLanguages();
                sourceCode = code; sourceName = name;
                DOM.sourceLangLabel.innerText = name;
            } else {
                if (code === sourceCode) return swapLanguages();
                targetCode = code; targetName = name;
                DOM.targetLangLabel.innerText = name;
            }
            DOM.sourceMenu.classList.remove('active');
            DOM.targetMenu.classList.remove('active');
            if(DOM.inputField.value.trim()) initiateTranslation();
        }

        function swapLanguages() {
            [sourceCode, targetCode] = [targetCode, sourceCode];
            [sourceName, targetName] = [targetName, sourceName];
            DOM.sourceLangLabel.innerText = sourceName;
            DOM.targetLangLabel.innerText = targetName;
            DOM.swapIcon.style.transform = "rotate(180deg)";
            setTimeout(() => DOM.swapIcon.style.transform = "rotate(0deg)", 300);
            if(DOM.inputField.value.trim()) initiateTranslation();
        }

        async function initiateTranslation() {
            const text = DOM.inputField.value.trim();
            if (!text) return;

            DOM.originalDisplay.innerText = text;
            DOM.translationResult.innerText = "";
            DOM.loader.classList.remove('hidden');
            DOM.errorBox.classList.add('hidden');

            try {
                const response = await fetch("/translate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text, source_language: sourceCode, target_language: targetCode })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || "Server Error");
                DOM.translationResult.innerText = data.translated_text;
            } catch (err) {
                DOM.translationResult.innerText = "Error";
                DOM.errorBox.innerText = err.message;
                DOM.errorBox.classList.remove('hidden');
            } finally {
                DOM.loader.classList.add('hidden');
            }
        }

        DOM.inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") initiateTranslation(); });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.lang-selector')) {
                DOM.sourceMenu.classList.remove('active');
                DOM.targetMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
